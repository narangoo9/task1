services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_secret
      POSTGRES_DB: taskflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U taskflow']
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Backend API ----
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder   # Use builder stage in dev for hot reload
    container_name: taskflow-api
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://taskflow:taskflow_secret@postgres:5432/taskflow
      DIRECT_URL: postgresql://taskflow:taskflow_secret@postgres:5432/taskflow
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-64chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-64chars
      FRONTEND_URL: http://localhost:3005
      LOG_LEVEL: debug
    ports:
      - '4000:4000'
    volumes:
      - ./backend/src:/app/src  # Hot reload in dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Шинэ/хоосон DB volume дээр шууд ажиллахын тулд schema-г startup дээр sync хийнэ.
    command: sh -lc "npx prisma db push && npm run dev"
    restart: unless-stopped

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # IMPORTANT: Next.js "NEXT_PUBLIC_*" env-үүд build time дээр inline болдог.
        # Build үед хоосон байвал client талын хүсэлтүүд relative болж 3005 дээр 404 үүсгэнэ.
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: taskflow-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3005:3000'
    depends_on:
      - api
    restart: unless-stopped

  # ---- Nginx Reverse Proxy (optional local HTTPS) ----
  nginx:
    image: nginx:alpine
    container_name: taskflow-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    profiles:
      - proxy  # Only start with: docker compose --profile proxy up

volumes:
  postgres_data:
  redis_data:
