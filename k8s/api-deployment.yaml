---
# ============================================================
# NAMESPACE
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: taskflow
  labels:
    app: taskflow

---
# ============================================================
# SECRET — populate via CI/CD (never commit real values)
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secrets
  namespace: taskflow
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@neon.tech/taskflow?sslmode=require"
  JWT_ACCESS_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_SECRET_2"
  REDIS_URL: "redis://redis-service:6379"

---
# ============================================================
# CONFIGMAP
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow
data:
  NODE_ENV: "production"
  PORT: "4000"
  LOG_LEVEL: "info"
  FRONTEND_URL: "https://taskflow.yourdomain.com"

---
# ============================================================
# API DEPLOYMENT — 3 replicas with rolling update
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-api
  namespace: taskflow
  labels:
    app: taskflow-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: taskflow-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime
  template:
    metadata:
      labels:
        app: taskflow-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      # Graceful shutdown
      terminationGracePeriodSeconds: 30

      containers:
        - name: api
          image: your-registry/taskflow-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http

          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: taskflow-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: taskflow-config
                  key: PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: DATABASE_URL
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: JWT_REFRESH_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: REDIS_URL
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: taskflow-config
                  key: FRONTEND_URL

          # Resource limits — tune for your nodes
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]

      affinity:
        # Spread pods across nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - taskflow-api
                topologyKey: kubernetes.io/hostname

---
# ============================================================
# API SERVICE — ClusterIP (Nginx Ingress handles external)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: taskflow-api-service
  namespace: taskflow
spec:
  selector:
    app: taskflow-api
  ports:
    - port: 4000
      targetPort: 4000
      name: http
  type: ClusterIP

---
# ============================================================
# HORIZONTAL POD AUTOSCALER
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskflow-api-hpa
  namespace: taskflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskflow-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ============================================================
# INGRESS — NGINX with TLS (cert-manager auto-renews)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskflow-ingress
  namespace: taskflow
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Sticky sessions for WebSocket (same pod = same connection)
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "taskflow-route"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # TLS via cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - taskflow.yourdomain.com
        - api.taskflow.yourdomain.com
      secretName: taskflow-tls
  rules:
    - host: api.taskflow.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskflow-api-service
                port:
                  number: 4000
